    <header class="header-menu">
      <!-- Score board -->
      <div class="score-board">
        <div class="score-board__player"> 
          <div class="score-board__img score-board__img--orange"></div>

        </div>
        <div class="score-board__player">

          <span id="score-player-blue" class="score-board__player--blue"><span class="score-board__player--add-color">Blue </span >6</span>
        </div>
      </div>
      <!-- Current player -->
      <div class="current-player">
        <span class="current-player__text">Current player: </span>
        <div class="current-player__icon current-player__icon--blue"> <!-- Hier kann man die Farben ändern -->
          <div class="current-player__img current-player__img--blue"></div>
        </div>
      </div>

  <dialog id="exit-dialog" class="exit-game">
    <div class="exit-game--content">
      <p class="exit-game--content__text">
        Are you sure you want <br />
        to quit the game?
      </p>
      <div class="exit-game--content__buttons">
        <button id="back-to-game-button" class="dialog-button dialog-button--stay">
          No, back to game
        </button>
        <button id="quit-game-button" class="dialog-button dialog-button--exit">
          Yes, quit game
        </button>
      </div>
