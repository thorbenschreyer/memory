<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./public/img/memory_favicon.ico"
      type="image/x-icon"
    />
    <script type="module" src="src/main.ts"></script>

    <title>Memory</title>
  </head>
  <body data-theme="da-project" class="gamefield-page">
    <header class="header-menu">
      <!-- Score board -->
      <div class="header-menu__score">
        <div class="header-menu__score--player">
          <div class="header-menu__img header-menu__img--orange"></div>
          
          <span id="score-player-orange" class="player-score-orange"><span class="header-menu__score--add-color">Orange </span> 4</span>
        </div>
        <div class="header-menu__score--player">
          <div class="header-menu__img header-menu__img--blue"></div>
          
          <span id="score-player-blue" class="player-score-blue"><span class="header-menu__score--add-color">Blue </span >6</span>
        </div>
      </div>
      <!-- Current player -->
      <div class="header-menu__player">
        <span class="header-menu__player--text">Current player: </span>
        <div class="header-menu__player--color">
          <div class="header-menu__current-player"></div>
        </div>
      </div>
      <!-- Exit button -->

      <div onclick="openDialog()" class="header-menu__exit">
        <div class="exit-img"></div>

        <div class="exit-img-hover"></div>
        
        <span>Exit game</span>
      </div>
    </header>

  <!-- Exit Dialog -->
  <dialog id="exit-dialog" class="exit-game">
    <div class="exit-game--content">
      <p class="exit-game--content__text">
        Are you sure you want <br />
        to quit the game?
      </p>
      <div class="exit-game--content__buttons">
        <button class="dialog-button dialog-button--stay">
          No, back to game
        </button>
        <button class="dialog-button dialog-button--exit">
          Yes, quit game
        </button>
      </div>
    </div>
