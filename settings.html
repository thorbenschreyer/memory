<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./public/img/memory_favicon.ico" type="image/x-icon" />
    <script type="module" src="src/main.ts"></script>

    <title>Memory</title>
  </head>
  <body class="settings">
            <div class="flex-collum">

                <div class="settings--content__header">
                    <h1>Settings</h1>
                    <img src="" alt="">
                </div>
                
                <div class="settings--content">

                    <div class="settings-detail">
                        <div class="flex-collumn"> 
                            <div class="settings-detail__header"> <img src="" alt=""> <span>Game themes</span></div>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="theme" value="leicht">Code vibes theme</label>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="theme" value="leicht">Gaming theme</label>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="theme" value="leicht">DA Projects theme</label>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="theme" value="leicht">Foods theme</label>
                        </div>

                        <div class="flex-collumn"> 
                            <div class="settings-detail__header"> <img src="" alt=""> <span>Choose player</span></div>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="player" value="blue">Blue</label>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="player" value="orange">Orange</label>
                        </div>

                        <div class="flex-collumn"> 
                            <div class="settings-detail__header"> <img src="" alt=""> <span>Board size</span></div>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="size" value="16">16 cards</label>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="size" value="24">24 cards</label>
                            <label class="settings-detail__radiobutton"> <input type="radio" name="size" value="36">36 cards</label>
                        </div>
                    </div>

                    <div class="show-settings--area">
                        <img src="" alt="">

                        <div class="show-settings--details">
                            <span> Game theme </span>
                            <hr>
                            <span> Player </span>
                            <hr>
                            <span> Board size </span>
                            <a class="button button--primary" href=""></a>

                        </div>
                    </div>

                </div>

            </div>
  </body>
</html>
